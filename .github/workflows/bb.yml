name: bb
on:
  schedule:
    - cron: '0 22 * * 0-4'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yt-dlp openai-whisper anthropic
      - run: python bb.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add -A
          git diff --cached --quiet || git commit -m "$(date +%Y-%m-%d)"
          git push
